# JReleaser configuration for Maven Central deployment
# Activated via the `release` Maven profile during manual-dispatch releases.
# Credentials and secrets are injected via GitHub Actions environment variables.
# -----------------------------------------------------------------------------
# GPG signing — armored ASCII, passphrase from environment
signing:
  active: ALWAYS
  armored: true
  mode: MEMORY

# -----------------------------------------------------------------------------
# Maven Central deployment target (JReleaser 1.15.0+ mavenCentral sub-type)
deploy:
  active: ALWAYS
  maven:
    mavenCentral:
      flamingock:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        username: ${JRELEASER_MAVENCENTRAL_USERNAME}
        password: ${JRELEASER_MAVENCENTRAL_PASSWORD}
        stagingRepositories:
          - target/staging-deploy
        # Built-in retry for transient Central Portal errors
        retryDelay: 20
        maxRetries: 90
