# Release workflow — manual dispatch only, never auto-triggers.
# -----------------------------------------------------------------------------
# Prerequisites (GitHub Secrets):
#   FLAMINGOCK_JRELEASER_MAVENCENTRAL_USERNAME
#   FLAMINGOCK_JRELEASER_MAVENCENTRAL_PASSWORD
#   FLAMINGOCK_JRELEASER_GPG_SECRET_KEY
#   FLAMINGOCK_JRELEASER_GPG_PASSPHRASE
# -----------------------------------------------------------------------------
name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FLAMINGOCK_JRELEASER_GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: maven

      - name: Resolve release version from pom.xml
        id: release_version
        run: |
          RELEASE_VERSION=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${RELEASE_VERSION}" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and prepare artifacts
        run: |
          ./mvnw -B -Prelease clean deploy \
          -Dgpg.skip=true \
          -DaltDeploymentRepository=local::default::file:target/staging-deploy

      - name: Dry-run deploy to Central Portal for SNAPSHOT versions
        if: steps.release_version.outputs.is_snapshot == 'true'
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.FLAMINGOCK_JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.FLAMINGOCK_JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.FLAMINGOCK_JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.FLAMINGOCK_JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.FLAMINGOCK_JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.FLAMINGOCK_JRELEASER_GITHUB_TOKEN }}
        run: ./mvnw -B -Prelease jreleaser:deploy -Djreleaser.dry.run=true -Djreleaser.config.file=jreleaser.yml

      - name: Deploy to Central Portal
        if: steps.release_version.outputs.is_snapshot != 'true'
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.FLAMINGOCK_JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.FLAMINGOCK_JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.FLAMINGOCK_JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.FLAMINGOCK_JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.FLAMINGOCK_JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.FLAMINGOCK_JRELEASER_GITHUB_TOKEN }}
        run: ./mvnw -B -Prelease jreleaser:deploy -Djreleaser.config.file=jreleaser.yml

      - name: Create and push release tag
        if: steps.release_version.outputs.is_snapshot != 'true'
        env:
          FLAMINGOCK_JRELEASER_GITHUB_TOKEN: ${{ secrets.FLAMINGOCK_JRELEASER_GITHUB_TOKEN }}
        run: |
          git tag "v${{ steps.release_version.outputs.release_version }}"
          git remote set-url origin "https://x-access-token:${FLAMINGOCK_JRELEASER_GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin --follow-tags
